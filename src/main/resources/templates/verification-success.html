<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Response Submitted - License Reclamation Engine</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-body text-center py-5">
                        <div class="mb-4">
                            <i class="bi bi-check-circle-fill text-success" style="font-size: 4rem;"></i>
                        </div>
                        
                        <h2 class="text-success mb-3">Response Submitted Successfully!</h2>
                        
                        <div th:if="${message}" class="alert alert-success">
                            <span th:text="${message}">Thank you for your response.</span>
                        </div>
                        
                        <div th:if="${error}" class="alert alert-danger">
                            <span th:text="${error}">An error occurred.</span>
                        </div>
                        
                        <p class="text-muted mb-4">
                            Your response has been recorded and forwarded to the IT team for processing.
                        </p>
                        
                        <div class="mt-4">
                            <small class="text-muted">
                                <i class="bi bi-envelope"></i>
                                You will receive a confirmation email shortly.
                            </small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
